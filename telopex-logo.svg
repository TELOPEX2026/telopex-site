<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3BD5"/>
      <stop offset="100%" style="stop-color:#4A1FA8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#6C3BD5" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="200" height="220" fill="#ffffff"/>

  <!-- Icon square -->
  <rect x="20" y="10" width="160" height="160" rx="36" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle inner glow ring -->
  <rect x="28" y="18" width="144" height="144" rx="30" fill="none" stroke="#A78BFA" stroke-width="1" opacity="0.25"/>

  <!-- Letters T X -->
  <text x="28" y="128"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="96"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-6"
    opacity="1">TX</text>

  <!-- Small accent dot -->
  <circle cx="152" cy="48" r="10" fill="#A78BFA" opacity="0.7"/>

  <!-- Telopex wordmark below -->
  <text x="100" y="198"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="18"
    font-weight="600"
    letter-spacing="4"
    fill="#0F172A"
    text-anchor="middle">TELOPEX</text>

  <!-- Thin underline accent -->
  <rect x="60" y="205" width="80" height="2" rx="1" fill="url(#bgGrad)"/>

</svg>
