<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Services — Telopex</title>
  <meta name="description" content="Découvrez tous les services Telopex : bots IA, automation multi-canaux, développement web et formations."/>
  <link rel="icon" href="telopex-logo.svg" />
  <link rel="stylesheet" href="style.css"/>
  <style>
    .service-detail {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      margin-bottom: 2rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .service-detail:hover {
      border-color: var(--purple);
      box-shadow: var(--glow);
    }
    .service-top {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.2rem;
    }
    .service-icon {
      width: 56px; height: 56px; border-radius: 14px;
      background: rgba(124,58,237,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; flex-shrink: 0;
    }
    .service-detail h2 { font-size: 1.4rem; }
    .service-detail .long {
      color: var(--muted); line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .tags {
      display: flex; flex-wrap: wrap; gap: .6rem;
    }
    .tag {
      background: rgba(124,58,237,0.1);
      border: 1px solid var(--border);
      padding: .35rem .9rem; border-radius: 100px;
      font-size: .8rem; color: var(--purple-l); font-weight: 500;
    }
    .delais-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }
    .delai-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.2rem;
    }
    .delai-card .duree {
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700;
      color: var(--cyan); margin-bottom: .3rem;
    }
    .delai-card .service-name {
      font-size: .85rem; color: var(--muted);
    }
    .paiement-list {
      display: flex; flex-wrap: wrap; gap: .8rem;
    }
    .paiement-item {
      background: var(--bg3); border: 1px solid var(--border);
      padding: .5rem 1rem; border-radius: 8px;
      font-size: .85rem; font-weight: 500;
    }
  </style>
</head>
<body>

<!-- PAGE HERO -->
<div class="page-hero" id="page-hero"></div>

<!-- SERVICES DÉTAILLÉS -->
<section id="services-list"></section>

<div class="divider"></div>

<!-- DÉLAIS -->
<section style="background: var(--bg2);" id="delais-section"></section>

<div class="divider"></div>

<!-- PAIEMENT -->
<section id="paiement-section"></section>

<!-- CTA -->
<div class="cta-band" id="cta-band"></div>

<script src="content.js"></script>
<script src="nav.js"></script>
<script src="chatbot.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const { services, delais, paiement } = TELOPEX;

  // ── PAGE HERO ──
  document.getElementById('page-hero').innerHTML = `
    <h1>Nos <span style="color:var(--purple-l)">Services</span></h1>
    <p>Des solutions concrètes adaptées à votre business, livrées par des experts passionnés.</p>
  `;

  // ── SERVICES DÉTAILLÉS ──
  document.getElementById('services-list').innerHTML = `
    <span class="section-eyebrow">Ce qu'on fait</span>
    <h2 class="section-title">Tout ce dont vous<br>avez besoin</h2>
    ${services.map(s => `
      <div class="service-detail">
        <div class="service-top">
          <div class="service-icon">${s.icon}</div>
          <h2>${s.titre}</h2>
        </div>
        <p class="long">${s.long}</p>
        <div class="tags">
          ${(s.canaux || s.technologies || s.themes || []).map(t =>
            `<span class="tag">${t}</span>`
          ).join('')}
        </div>
      </div>`).join('')}
  `;

  // ── DÉLAIS ──
  document.getElementById('delais-section').innerHTML = `
    <span class="section-eyebrow">Délais de livraison</span>
    <h2 class="section-title">On livre vite,<br>on livre bien</h2>
    <p class="section-subtitle">Estimations indicatives — délai précis défini au devis.</p>
    <div class="delais-grid">
      ${delais.map(d => `
        <div class="delai-card">
          <div class="duree">${d.duree}</div>
          <div class="service-name">${d.service}</div>
        </div>`).join('')}
    </div>
  `;

  // ── PAIEMENT ──
  document.getElementById('paiement-section').innerHTML = `
    <span class="section-eyebrow">Moyens de paiement</span>
    <h2 class="section-title">Payez comme<br>vous voulez</h2>
    <p class="section-subtitle">Des options adaptées aux réalités africaines et internationales.</p>
    <div class="paiement-list">
      ${paiement.map(p => `
        <div class="paiement-item">💳 ${p}</div>`).join('')}
    </div>
  `;

  // ── CTA ──
  document.getElementById('cta-band').innerHTML = `
    <h2>Un projet en tête ?</h2>
    <p>Devis gratuit sous 24h. Discutons de vos besoins.</p>
    <a href="contact.html" class="btn-primary">Demander un devis ⚡</a>
  `;
});
</script>
</body>
</html>
