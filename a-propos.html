<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>À propos — Telopex</title>
  <meta name="description" content="Qui est Telopex ? Notre histoire, nos valeurs et notre vision."/>
  <link rel="icon" href="telopex-logo.svg" />
  <link rel="stylesheet" href="style.css"/>
  <style>
    .valeurs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.2rem;
    }
    .valeur-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.8rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .valeur-card:hover {
      border-color: var(--purple);
      box-shadow: var(--glow);
    }
    .valeur-icon { font-size: 2rem; margin-bottom: .8rem; }
    .valeur-card h4 { font-size: 1rem; margin-bottom: .4rem; }
    .valeur-card p  { font-size: .85rem; color: var(--muted); line-height: 1.6; }

    .vision-block {
      background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(6,182,212,0.05));
      border: 1px solid var(--border);
      border-radius: 20px; padding: 3rem;
    }
    .vision-block h2 { font-size: clamp(1.5rem, 3vw, 2rem); margin-bottom: 1rem; }
    .vision-block p  { color: var(--muted); line-height: 1.8; font-size: 1.05rem; }

    .zones-list {
      display: flex; flex-wrap: wrap; gap: .8rem;
      margin-top: 1.5rem;
    }
    .zone-tag {
      background: var(--bg3); border: 1px solid var(--border);
      padding: .5rem 1rem; border-radius: 100px;
      font-size: .85rem; font-weight: 500;
    }

    .apropos-text p {
      color: var(--muted); line-height: 1.8;
      font-size: 1.05rem; margin-bottom: 1.2rem;
    }
  </style>
</head>
<body>

<!-- PAGE HERO -->
<div class="page-hero" id="page-hero"></div>

<!-- QUI SOMMES-NOUS -->
<section id="apropos-section"></section>

<div class="divider"></div>

<!-- VALEURS -->
<section style="background: var(--bg2);" id="valeurs-section"></section>

<div class="divider"></div>

<!-- ZONES -->
<section id="zones-section"></section>

<div class="divider"></div>

<!-- VISION -->
<section id="vision-section"></section>

<!-- CTA -->
<div class="cta-band" id="cta-band"></div>

<script src="content.js"></script>
<script src="nav.js"></script>
<script src="chatbot.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const { apropos, vision, zones } = TELOPEX;

  // ── PAGE HERO ──
  document.getElementById('page-hero').innerHTML = `
    <h1>À <span style="color:var(--purple-l)">propos</span></h1>
    <p>Qui sommes-nous, ce en quoi nous croyons, et où nous allons.</p>
  `;

  // ── QUI SOMMES-NOUS ──
  document.getElementById('apropos-section').innerHTML = `
    <span class="section-eyebrow">Notre histoire</span>
    <h2 class="section-title">${apropos.titre}</h2>
    <div class="apropos-text">
      <p>${apropos.paragraphe1}</p>
      <p>${apropos.paragraphe2}</p>
    </div>
  `;

  // ── VALEURS ──
  document.getElementById('valeurs-section').innerHTML = `
    <span class="section-eyebrow">Nos valeurs</span>
    <h2 class="section-title">Ce qui nous<br>guide</h2>
    <div class="valeurs-grid">
      ${apropos.valeurs.map(v => `
        <div class="valeur-card">
          <div class="valeur-icon">${v.icon}</div>
          <h4>${v.titre}</h4>
          <p>${v.description}</p>
        </div>`).join('')}
    </div>
  `;

  // ── ZONES ──
  document.getElementById('zones-section').innerHTML = `
    <span class="section-eyebrow">Zones de service</span>
    <h2 class="section-title">Partout en Afrique<br>et à l'international</h2>
    <p class="section-subtitle">Basés à Abidjan, on travaille avec des clients partout dans le monde.</p>
    <div class="zones-list">
      <div class="zone-tag">🇨🇮 Côte d'Ivoire</div>
      <div class="zone-tag">🇸🇳 Sénégal</div>
      <div class="zone-tag">🇨🇲 Cameroun</div>
      <div class="zone-tag">🇧🇯 Bénin</div>
      <div class="zone-tag">🇹🇬 Togo</div>
      <div class="zone-tag">🇲🇱 Mali</div>
      <div class="zone-tag">🇧🇫 Burkina Faso</div>
      <div class="zone-tag">🇳🇬 Nigeria</div>
      <div class="zone-tag">🇬🇭 Ghana</div>
      <div class="zone-tag">🌍 Afrique francophone</div>
      <div class="zone-tag">🌐 International</div>
    </div>
  `;

  // ── VISION ──
  document.getElementById('vision-section').innerHTML = `
    <div class="vision-block">
      <span class="section-eyebrow">Notre vision</span>
      <h2>${vision.titre}</h2>
      <p>${vision.texte}</p>
    </div>
  `;

  // ── CTA ──
  document.getElementById('cta-band').innerHTML = `
    <h2>Travaillons<br>ensemble</h2>
    <p>Vous avez un projet ? On a la solution.</p>
    <a href="contact.html" class="btn-primary">Nous contacter ⚡</a>
  `;
});
</script>
</body>
</html>
