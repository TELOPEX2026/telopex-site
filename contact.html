<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Telopex</title>
  <meta name="description" content="Contactez Telopex pour démarrer votre projet digital."/>
  <link rel="icon" href="telopex-logo.svg" />
  <link rel="stylesheet" href="style.css"/>
  <style>
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    @media (max-width: 768px) {
      .contact-grid { grid-template-columns: 1fr; }
    }
    .contact-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 2rem;
    }
    .contact-card h3 {
      font-size: 1.1rem; margin-bottom: 1.5rem;
      color: var(--purple-l);
    }
    .contact-channels {
      display: flex; flex-direction: column; gap: 1rem;
    }
    .channel-btn {
      display: flex; align-items: center; gap: 1rem;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 1.2rem;
      transition: border-color .2s, transform .15s;
      cursor: pointer;
    }
    .channel-btn:hover {
      border-color: var(--purple-l);
      transform: translateX(4px);
    }
    .channel-icon {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }
    .channel-icon.wa  { background: rgba(37,211,102,0.15); }
    .channel-icon.tg  { background: rgba(0,136,204,0.15); }
    .channel-icon.fb  { background: rgba(24,119,242,0.15); }
    .channel-icon.em  { background: rgba(124,58,237,0.15); }
    .channel-info { flex: 1; }
    .channel-name  { font-weight: 600; font-size: .95rem; }
    .channel-value { font-size: .82rem; color: var(--muted); margin-top: .2rem; }
    .channel-arrow { color: var(--muted); font-size: .9rem; }

    .form-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 2rem;
    }
    .form-card h3 { font-size: 1.1rem; margin-bottom: 1.5rem; color: var(--purple-l); }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label {
      display: block; font-size: .85rem;
      color: var(--muted); margin-bottom: .5rem; font-weight: 500;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%; background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px; padding: .85rem 1rem;
      font-size: .9rem; color: var(--white);
      font-family: 'Inter', sans-serif; outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: var(--purple); }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .form-group select option { background: var(--bg3); }
    .form-submit {
      width: 100%; padding: .9rem;
      background: var(--purple); color: #fff;
      border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer; font-family: 'Syne', sans-serif;
      transition: background .2s, transform .15s;
    }
    .form-submit:hover { background: var(--purple-l); transform: translateY(-2px); }
    .form-success {
      display: none; text-align: center;
      padding: 2rem; color: var(--cyan);
    }
    .form-success .check { font-size: 3rem; margin-bottom: 1rem; }
  </style>
</head>
<body>

<!-- PAGE HERO -->
<div class="page-hero" id="page-hero"></div>

<!-- CONTACT -->
<section id="contact-section"></section>

<!-- CTA -->
<div class="cta-band" id="cta-band"></div>

<script src="content.js"></script>
<script src="nav.js"></script>
<script src="chatbot.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const { contact } = TELOPEX;

  // ── PAGE HERO ──
  document.getElementById('page-hero').innerHTML = `
    <h1>Nous <span style="color:var(--purple-l)">contacter</span></h1>
    <p>Discutons de votre projet. On répond sous 24h.</p>
  `;

  // ── CONTACT ──
  document.getElementById('contact-section').innerHTML = `
    <span class="section-eyebrow">Restons en contact</span>
    <h2 class="section-title">Choisissez votre<br>canal préféré</h2>
    <div class="contact-grid">

      <!-- Canaux -->
      <div class="contact-card">
        <h3>📲 Contactez-nous directement</h3>
        <div class="contact-channels">

          <a href="${contact.whatsappLink}" target="_blank" class="channel-btn">
            <div class="channel-icon wa">💬</div>
            <div class="channel-info">
              <div class="channel-name">WhatsApp</div>
              <div class="channel-value">${contact.whatsapp}</div>
            </div>
            <span class="channel-arrow">→</span>
          </a>

          <a href="${contact.telegramLink}" target="_blank" class="channel-btn">
            <div class="channel-icon tg">✈️</div>
            <div class="channel-info">
              <div class="channel-name">Telegram</div>
              <div class="channel-value">${contact.telegram}</div>
            </div>
            <span class="channel-arrow">→</span>
          </a>

          <a href="${contact.facebook}" target="_blank" class="channel-btn">
            <div class="channel-icon fb">📘</div>
            <div class="channel-info">
              <div class="channel-name">Facebook</div>
              <div class="channel-value">Telopex</div>
            </div>
            <span class="channel-arrow">→</span>
          </a>

          <a href="mailto:${contact.email}" class="channel-btn">
            <div class="channel-icon em">📧</div>
            <div class="channel-info">
              <div class="channel-name">Email</div>
              <div class="channel-value">${contact.email}</div>
            </div>
            <span class="channel-arrow">→</span>
          </a>

        </div>
      </div>

      <!-- Formulaire -->
      <div class="form-card">
        <h3>✍️ Envoyez-nous un message</h3>
        <div id="contactForm">
          <div class="form-group">
            <label>Votre nom</label>
            <input type="text" id="fname" placeholder="Ex: Jean Kouassi" />
          </div>
          <div class="form-group">
            <label>Email ou WhatsApp</label>
            <input type="text" id="fcontact" placeholder="Ex: jean@email.com ou +225..." />
          </div>
          <div class="form-group">
            <label>Service souhaité</label>
            <select id="fservice">
              <option value="">-- Choisir --</option>
              <option>Bot IA Multi-canaux</option>
              <option>Automation Multi-canaux</option>
              <option>Développement Web</option>
              <option>Widget Chatbot IA</option>
              <option>Formation</option>
              <option>Autre</option>
            </select>
          </div>
          <div class="form-group">
            <label>Votre message</label>
            <textarea id="fmessage" placeholder="Décrivez votre projet..."></textarea>
          </div>
          <button class="form-submit" id="fsubmit">Envoyer le message ⚡</button>
        </div>
        <div class="form-success" id="formSuccess">
          <div class="check">✅</div>
          <h3>Message envoyé !</h3>
          <p>Merci ! On vous répond sous 24h.</p>
        </div>
      </div>

    </div>
  `;

  // ── FORM SUBMIT ──
  document.getElementById('fsubmit').addEventListener('click', () => {
    const name    = document.getElementById('fname').value.trim();
    const contact = document.getElementById('fcontact').value.trim();
    const service = document.getElementById('fservice').value;
    const message = document.getElementById('fmessage').value.trim();

    if (!name || !contact || !message) {
      alert('Veuillez remplir tous les champs obligatoires.');
      return;
    }

    // Envoyer via WhatsApp
    const text = `Bonjour Telopex ! 👋%0ANom : ${name}%0AContact : ${contact}%0AService : ${service || 'Non précisé'}%0AMessage : ${message}`;
    window.open(`https://wa.me/22589156754?text=${text}`, '_blank');

    document.getElementById('contactForm').style.display = 'none';
    document.getElementById('formSuccess').style.display = 'block';
  });

  // ── CTA ──
  document.getElementById('cta-band').innerHTML = `
    <h2>Réponse garantie<br>sous 24h ⚡</h2>
    <p>On est là pour vous accompagner dans votre transformation digitale.</p>
    <a href="${TELOPEX.contact.whatsappLink}" target="_blank" class="btn-primary">💬 WhatsApp direct</a>
  `;
});
</script>
</body>
</html>
