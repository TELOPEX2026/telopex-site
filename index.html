<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Telopex — Au sommet du digital</title>
  <meta name="description" content="Telopex conçoit des solutions IA, automation multi-canaux et développement web pour les entreprises qui veulent innover et scaler."/>
  <link rel="icon" href="telopex-logo.svg" />
  <link rel="stylesheet" href="style.css"/>
  <style>
    .bg-alt { background: var(--bg2); }

    /* CANAUX */
    .canaux-list { display: flex; flex-wrap: wrap; gap: 1rem; }
    .canal-tag {
      display: flex; align-items: center; gap: .5rem;
      background: var(--bg3); border: 1px solid var(--border);
      padding: .6rem 1.2rem; border-radius: 100px;
      font-size: .9rem; font-weight: 500;
      transition: border-color .2s;
    }
    .canal-tag:hover { border-color: var(--purple-l); }

    /* PROCESSUS */
    .process-steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem; counter-reset: steps;
    }
    .step {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.8rem;
      counter-increment: steps;
    }
    .step::before {
      content: counter(steps, decimal-leading-zero);
      font-family: 'Syne', sans-serif; font-size: .75rem;
      font-weight: 800; color: var(--purple-l);
      letter-spacing: .1em; display: block; margin-bottom: .8rem;
    }
    .step h3 { font-size: 1rem; margin-bottom: .5rem; }
    .step p  { font-size: .85rem; color: var(--muted); }
  </style>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content" id="hero-content">
    <!-- Injecté par content.js -->
  </div>
</section>

<div class="divider"></div>

<!-- SERVICES -->
<section class="bg-alt" id="services-section">
  <!-- Injecté par content.js -->
</section>

<div class="divider"></div>

<!-- CANAUX -->
<section id="canaux-section">
  <!-- Injecté par content.js -->
</section>

<div class="divider"></div>

<!-- PROCESSUS -->
<section class="bg-alt" id="process-section">
  <!-- Injecté par content.js -->
</section>

<!-- CTA -->
<div class="cta-band" id="cta-band">
  <!-- Injecté par content.js -->
</div>

<script src="content.js"></script>
<script src="nav.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const { hero, services, canaux, processus } = TELOPEX;

  // ── HERO ──
  document.getElementById('hero-content').innerHTML = `
    <div class="hero-badge">${hero.badge}</div>
    <h1>${hero.titre1}<br><span class="accent">${hero.titre2}</span></h1>
    <p>${hero.description}</p>
    <div class="hero-actions">
      <a href="contact.html" class="btn-primary">${hero.cta1}</a>
      <a href="services.html" class="btn-secondary">${hero.cta2}</a>
    </div>
    <div class="hero-stats">
      ${hero.stats.map(s => `
        <div>
          <div class="stat-num">${s.valeur}</div>
          <div class="stat-label">${s.label}</div>
        </div>`).join('')}
    </div>
  `;

  // ── SERVICES ──
  document.getElementById('services-section').innerHTML = `
    <span class="section-eyebrow">Ce qu'on fait</span>
    <h2 class="section-title">Des solutions qui<br>travaillent pour vous</h2>
    <p class="section-subtitle">De l'IA à l'automation, on connecte chaque canal de votre business.</p>
    <div class="cards-grid">
      ${services.map(s => `
        <div class="card">
          <div class="card-icon">${s.icon}</div>
          <h3>${s.titre}</h3>
          <p>${s.court}</p>
          <a href="services.html" class="card-link">En savoir plus →</a>
        </div>`).join('')}
    </div>
  `;

  // ── CANAUX ──
  document.getElementById('canaux-section').innerHTML = `
    <span class="section-eyebrow">Canaux supportés</span>
    <h2 class="section-title">Partout où sont<br>vos clients</h2>
    <p class="section-subtitle" style="margin-bottom:2rem;">On connecte vos services aux plateformes que vos clients utilisent déjà.</p>
    <div class="canaux-list">
      ${canaux.map(c => `
        <div class="canal-tag">${c.icon} ${c.label}</div>`).join('')}
    </div>
  `;

  // ── PROCESSUS ──
  document.getElementById('process-section').innerHTML = `
    <span class="section-eyebrow">Comment ça marche</span>
    <h2 class="section-title">Simple et efficace</h2>
    <p class="section-subtitle">De la première discussion à la livraison.</p>
    <div class="process-steps">
      ${processus.map(p => `
        <div class="step">
          <h3>${p.titre}</h3>
          <p>${p.description}</p>
        </div>`).join('')}
    </div>
  `;

  // ── CTA ──
  document.getElementById('cta-band').innerHTML = `
    <h2>Prêt à automatiser<br>votre business ?</h2>
    <p>Discutons de votre projet. Réponse sous 24h.</p>
    <a href="contact.html" class="btn-primary">Nous contacter ⚡</a>
  `;
});
</script>
</body>
</html>
