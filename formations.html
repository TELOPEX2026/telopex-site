<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formations — Telopex</title>
  <meta name="description" content="Apprenez à créer vos propres bots IA et automatisations avec les formations Telopex."/>
  <link rel="icon" href="telopex-logo.svg" />
  <link rel="stylesheet" href="style.css"/>
  <style>
    .formation-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 2rem;
      transition: border-color .2s, transform .2s, box-shadow .2s;
    }
    .formation-card:hover {
      border-color: var(--purple);
      transform: translateY(-4px);
      box-shadow: var(--glow);
    }
    .formation-badge {
      display: inline-block;
      background: rgba(124,58,237,0.15);
      border: 1px solid var(--border);
      padding: .3rem .8rem; border-radius: 100px;
      font-size: .75rem; color: var(--purple-l);
      font-weight: 600; margin-bottom: 1rem;
    }
    .formation-card h3 { font-size: 1.2rem; margin-bottom: .6rem; }
    .formation-card p  { font-size: .9rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.2rem; }
    .formation-card ul {
      list-style: none; display: flex;
      flex-direction: column; gap: .5rem;
    }
    .formation-card ul li {
      font-size: .85rem; color: var(--muted);
      display: flex; align-items: flex-start; gap: .5rem;
    }
    .formation-card ul li::before {
      content: '✓'; color: var(--cyan);
      font-weight: 700; flex-shrink: 0;
    }
    .avantages-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.2rem;
    }
    .avantage {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.5rem;
      text-align: center;
    }
    .avantage .av-icon { font-size: 2rem; margin-bottom: .8rem; }
    .avantage h4 { font-size: 1rem; margin-bottom: .4rem; }
    .avantage p  { font-size: .85rem; color: var(--muted); }
  </style>
</head>
<body>

<!-- PAGE HERO -->
<div class="page-hero" id="page-hero"></div>

<!-- FORMATIONS -->
<section id="formations-list"></section>

<div class="divider"></div>

<!-- AVANTAGES -->
<section style="background: var(--bg2);" id="avantages-section"></section>

<!-- CTA -->
<div class="cta-band" id="cta-band"></div>

<script src="content.js"></script>
<script src="nav.js"></script>
<script src="chatbot.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const { services } = TELOPEX;
  const formation = services.find(s => s.titre === 'Formations');

  // ── PAGE HERO ──
  document.getElementById('page-hero').innerHTML = `
    <h1>Nos <span style="color:var(--purple-l)">Formations</span></h1>
    <p>Acquérez les compétences pour créer vos propres outils digitaux — bots IA, automation, développement web.</p>
  `;

  // ── FORMATIONS ──
  const themes = formation?.themes || [];
  const formationsData = [
    {
      badge: 'Débutant → Avancé',
      titre: 'Créer un Bot IA Multi-canaux',
      description: 'Apprenez à concevoir et déployer un chatbot intelligent sur WhatsApp, Telegram et Messenger. De zéro à la mise en production.',
      points: [
        'Comprendre les APIs de messagerie',
        'Intégrer une IA dans votre bot',
        'Déployer sur un serveur cloud',
        'Gérer les conversations et l\'historique',
      ]
    },
    {
      badge: 'Pratique',
      titre: 'Automation Multi-canaux avec n8n',
      description: 'Automatisez vos processus métier sans code complexe. Connectez WhatsApp, Email, Google Sheets et vos outils en workflows intelligents.',
      points: [
        'Créer des workflows n8n',
        'Connecter plusieurs canaux',
        'Automatiser les notifications et relances',
        'Intégrer des APIs externes',
      ]
    },
    {
      badge: 'Front-end',
      titre: 'Développement Web Front-end',
      description: 'Maîtrisez HTML, CSS, JavaScript et React pour créer des sites web modernes, responsives et professionnels.',
      points: [
        'HTML / CSS / JavaScript de base',
        'Design responsive (mobile + PC)',
        'Introduction à React',
        'Déploiement sur Vercel',
      ]
    },
    {
      badge: 'IA & API',
      titre: 'Intégration d\'APIs IA',
      description: 'Apprenez à connecter des modèles d\'IA (Gemini, GPT, etc.) à vos applications web et bots.',
      points: [
        'Comprendre les APIs IA',
        'Appels API en JavaScript/Node.js',
        'Gérer les prompts système',
        'Sécuriser vos clés API',
      ]
    },
  ];

  document.getElementById('formations-list').innerHTML = `
    <span class="section-eyebrow">Formations disponibles</span>
    <h2 class="section-title">Apprenez à construire<br>vos propres outils</h2>
    <p class="section-subtitle">Formations pratiques, orientées résultats. Pas de théorie inutile.</p>
    <div class="cards-grid">
      ${formationsData.map(f => `
        <div class="formation-card">
          <span class="formation-badge">${f.badge}</span>
          <h3>${f.titre}</h3>
          <p>${f.description}</p>
          <ul>
            ${f.points.map(p => `<li>${p}</li>`).join('')}
          </ul>
        </div>`).join('')}
    </div>
  `;

  // ── AVANTAGES ──
  document.getElementById('avantages-section').innerHTML = `
    <span class="section-eyebrow">Pourquoi nos formations</span>
    <h2 class="section-title">Ce qui nous<br>distingue</h2>
    <div class="avantages-grid">
      <div class="avantage">
        <div class="av-icon">🎯</div>
        <h4>100% Pratique</h4>
        <p>Chaque formation débouche sur un projet concret livrable.</p>
      </div>
      <div class="avantage">
        <div class="av-icon">📱</div>
        <h4>Accessible partout</h4>
        <p>Suivez depuis votre téléphone, tablette ou PC.</p>
      </div>
      <div class="avantage">
        <div class="av-icon">♾️</div>
        <h4>Accès à vie</h4>
        <p>Les ressources restent disponibles indéfiniment.</p>
      </div>
      <div class="avantage">
        <div class="av-icon">🤝</div>
        <h4>Accompagnement</h4>
        <p>Support personnalisé tout au long de votre apprentissage.</p>
      </div>
    </div>
  `;

  // ── CTA ──
  document.getElementById('cta-band').innerHTML = `
    <h2>Prêt à monter<br>en compétences ?</h2>
    <p>Contactez-nous pour démarrer votre formation dès aujourd'hui.</p>
    <a href="contact.html" class="btn-primary">S'inscrire maintenant ⚡</a>
  `;
});
</script>
</body>
</html>
